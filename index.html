<script>
const PHRASES=[
{cat:"Power vocabulary",type:"power",items:[
{p:"That's a nuanced point.",m:"Shows you see complexity others miss.",before:"That's complicated.",after:"That's a nuanced point — let me unpack it.",tip:"Use when someone raises a layered issue in a meeting."},
{p:"The underlying issue here is...",m:"Cuts through surface noise to the root cause.",before:"The real problem is...",after:"The underlying issue here is that our infrastructure hasn't scaled with demand.",tip:"Sounds more analytical than 'the real problem.'"},
{p:"From a strategic standpoint...",m:"Signals executive-level thinking.",before:"I think we should...",after:"From a strategic standpoint, this investment positions us well for Q3.",tip:"Opens any recommendation with gravitas."},
{p:"To put this in context...",m:"Frames data so it lands with meaning.",before:"So the numbers are...",after:"To put this in context, last year's baseline was 40% lower.",tip:"Use before sharing any statistic."},
{p:"The implication of this is...",m:"Shows you think beyond the obvious.",before:"So that means...",after:"The implication of this is that we may need to revisit our rollout timeline.",tip:"Elevates casual observations to analytical conclusions."},
{p:"What this essentially means is...",m:"Translates technical content for non-technical audiences.",before:"In other words...",after:"What this essentially means is the system can handle ten times the load.",tip:"Perfect when translating tech to business stakeholders."},
{p:"I'd like to draw a distinction here.",m:"Signals precise thinking.",before:"Wait, those are different...",after:"I'd like to draw a distinction here between system performance and user experience.",tip:"Use when two concepts are being blurred."},
{p:"That's a compelling argument.",m:"Acknowledges a strong point professionally.",before:"Yeah that's a good point.",after:"That's a compelling argument — and it reinforces what I was about to propose.",tip:"Validates others while keeping your momentum."},
{p:"Let me offer a different perspective.",m:"Disagrees gracefully without confrontation.",before:"I don't agree.",after:"Let me offer a different perspective on that.",tip:"The professional way to push back."},
{p:"The data suggests...",m:"Grounds your opinion in evidence.",before:"I think...",after:"The data suggests we're looking at a two-month delay if we don't act now.",tip:"Shifts from opinion to evidence-based language."},
{p:"That's not entirely accurate.",m:"Corrects someone without embarrassing them.",before:"That's wrong.",after:"That's not entirely accurate — let me add some context.",tip:"Useful for diplomatic corrections."},
{p:"To be precise...",m:"Signals technical accuracy.",before:"I mean...",after:"To be precise, the latency issue occurs only under peak load conditions.",tip:"Use before a technical clarification."},
{p:"This warrants further discussion.",m:"Flags an issue without derailing the meeting.",before:"We need to talk about this more.",after:"This warrants further discussion — can we schedule a follow-up?",tip:"Elegant way to table something."},
{p:"Let me be transparent about this.",m:"Signals honesty and builds trust.",before:"I have to tell you...",after:"Let me be transparent — we are behind schedule by about two weeks.",tip:"Use when delivering uncomfortable truths."},
{p:"That aligns with what I've been observing.",m:"Validates a point while adding your authority.",before:"Yeah I noticed that too.",after:"That aligns with what I've been observing over the past quarter.",tip:"Shows you've been paying attention."},
]},
{cat:"Presentation phrases",type:"exec",items:[
{p:"Let me walk you through this.",m:"Classic professional opener.",before:"So let me explain...",after:"Let me walk you through the architecture of the system.",tip:"Use to open any technical explanation."},
{p:"There are three key points I want to make.",m:"Signals organized thinking.",before:"I have some things to say...",after:"There are three key points I want to make about our migration plan.",tip:"Always preview your structure."},
{p:"Let me start with the big picture.",m:"Opens broad before going deep.",before:"Okay so first...",after:"Let me start with the big picture before we get into the details.",tip:"Essential for mixed audiences."},
{p:"This brings me to my next point.",m:"Smooth transition between ideas.",before:"And also...",after:"This brings me to my next point about scalability.",tip:"Replaces the dreaded 'um, so...'"},
{p:"To summarize what we've covered...",m:"Signals you're wrapping up.",before:"So yeah that's it...",after:"To summarize: the problem, the solution, and the timeline.",tip:"Always close with a summary."},
{p:"The question worth asking here is...",m:"Introduces a key point as a rhetorical question.",before:"So we need to think about...",after:"The question worth asking here is: can our infrastructure support this growth?",tip:"Engages the audience."},
{p:"What makes this significant is...",m:"Tells the audience why they should care.",before:"This is important because...",after:"What makes this significant is that no other vendor has solved this.",tip:"Use after presenting a finding."},
{p:"I want to be very clear about this.",m:"Signals a critical point is coming.",before:"Listen...",after:"I want to be very clear — this is not a resource issue, it's a process issue.",tip:"Prevents misunderstanding."},
{p:"Bear with me for a moment.",m:"Buys time confidently.",before:"Um wait...",after:"Bear with me for a moment while I pull up the right data.",tip:"Confident people say this."},
{p:"Does that make sense so far?",m:"Checks comprehension professionally.",before:"You understand?",after:"Does that make sense so far, or would you like me to go deeper?",tip:"Better than 'you get it?'"},
{p:"Let me give you a concrete example.",m:"Signals a practical illustration.",before:"Like for example...",after:"Let me give you a concrete example of how this plays out in production.",tip:"Grounds abstract concepts in reality."},
{p:"The bottom line is...",m:"Cuts to the conclusion.",before:"So basically...",after:"The bottom line is: we need three more weeks to do this right.",tip:"Executives love this phrase."},
{p:"My recommendation would be...",m:"Owns a position with confidence.",before:"I think maybe we should...",after:"My recommendation would be to phase the rollout over two quarters.",tip:"Sounds considered but still authoritative."},
{p:"This is where it gets interesting.",m:"Re-engages an audience that may be drifting.",before:"Okay so now...",after:"This is where it gets interesting — the system performs better under stress.",tip:"Use before your most important point."},
]},
{cat:"Social conversation",type:"social",items:[
{p:"How do you know [the host]?",m:"The universal opener at any party.",before:"(standing alone nervously)",after:"How do you know Sarah? Did you two go to school together?",tip:"Works at every event. Everyone has an answer."},
{p:"I love what you said about...",m:"Joins an existing group conversation gracefully.",before:"(interrupting awkwardly)",after:"I love what you said about that — I've been thinking the same thing.",tip:"Listen 30 seconds before jumping in."},
{p:"This is my first time here — is it always this lively?",m:"Admits newness in a charming way.",before:"I don't really know anyone here.",after:"This is my first time here — is it always this lively?",tip:"Invites people to help you feel welcome."},
{p:"What do you do when you're not [here]?",m:"Gets people talking about what they love.",before:"What do you do for work?",after:"What do you do when you're not celebrating your friends' birthdays?",tip:"More interesting than 'what do you do?'"},
{p:"That's actually really fascinating — tell me more.",m:"The phrase that makes anyone feel heard.",before:"Oh okay cool.",after:"That's actually really fascinating — tell me more about how that works.",tip:"People remember feeling interesting, not when you were interesting."},
{p:"You know, I never thought about it that way.",m:"Shows intellectual humility.",before:"Hmm.",after:"You know, I never thought about it that way. That actually changes how I see it.",tip:"Makes the other person feel insightful."},
{p:"Can I ask your take on something?",m:"Invites someone into a mini-discussion.",before:"What do you think?",after:"Can I ask your take on something? I've been wrestling with this idea.",tip:"People feel flattered when asked for their opinion."},
{p:"What's been the highlight of your week?",m:"Better than 'how are you' — gets a real answer.",before:"How are you doing?",after:"What's been the highlight of your week so far?",tip:"Almost no one asks this. It makes you memorable."},
{p:"I couldn't help but overhear — sorry to jump in, but...",m:"Polite way to join a conversation.",before:"(never joining)",after:"I couldn't help but overhear — I'm sorry to jump in, but I dealt with something similar.",tip:"The apology makes the interruption welcome."},
{p:"That reminds me of something that happened to me.",m:"Natural bridge to sharing your own story.",before:"Oh yeah me too...",after:"That actually reminds me of something when I first moved to the U.S.",tip:"Personal stories connect faster than facts."},
]},
{cat:"Dad joke delivery",type:"dad",items:[
{p:"Okay, I have to warn you — this is a dad joke.",m:"The pre-warning is half the humor.",before:"(just saying the joke cold)",after:"Okay, I have to warn you — this is a dad joke. You ready?",tip:"The meta-awareness makes it funnier every time."},
{p:"I'm not apologizing for that one.",m:"Sells the joke after the groan.",before:"(laughing nervously)",after:"(after the groan) I'm not apologizing for that one. That was solid.",tip:"Confidence after a groan is the key to dad joke delivery."},
{p:"I've been waiting all day to say that.",m:"Classic dad joke closer.",before:"Haha get it?",after:"I've been waiting all day to say that.",tip:"Implies you planned it — more endearing."},
{p:"That one's free. The next one costs you.",m:"Keeps energy going after a successful joke.",before:"(nothing)",after:"That one's free. The next one costs you.",tip:"Works perfectly on a roll with your son's friends."},
{p:"I know, I know. I'll see myself out.",m:"Self-aware exit after a truly terrible pun.",before:"(laughing at your own joke too hard)",after:"I know, I know. I'll see myself out.",tip:"Physically pretend to leave. Gets a laugh every time."},
]},
{cat:"Public speaking",type:"speaker",items:[
{p:"Thank you for having me — it's an honor to be here.",m:"Classic and graceful opening.",before:"Um okay so thank you for inviting me...",after:"Thank you for having me — it's a genuine honor to be here with all of you today.",tip:"Say it slowly. Don't rush the opening."},
{p:"Let me start with a question.",m:"Engages the audience from sentence one.",before:"So today I'm going to talk about...",after:"Let me start with a question — how many of you have felt technology was working against you?",tip:"Rhetorical questions create instant participation."},
{p:"In my experience working with...",m:"Grounds your credibility naturally.",before:"I know a lot about this because...",after:"In my experience working with insurance carriers and fleet operators across the country...",tip:"Let your experience speak — don't announce it."},
{p:"What I've come to believe, after decades in this field, is...",m:"Authority statement that carries weight.",before:"I think...",after:"What I've come to believe, after decades in this field, is that technology only works when people trust it.",tip:"'Decades in this field' does the credibility work for you."},
{p:"Let me tell you a story.",m:"The most powerful pivot in any talk.",before:"Here's an example...",after:"Let me tell you a story. When I first came to this country at 13 years old...",tip:"The audience leans in every single time."},
{p:"And that's when it hit me.",m:"The turning point phrase in any story.",before:"And then I realized...",after:"And that's when it hit me — the problem wasn't the system. It was how we were thinking about it.",tip:"'Hit me' is visceral. Signals a genuine moment of insight."},
{p:"If there's one thing I want you to take away today...",m:"Signals your core message.",before:"So the main point is...",after:"If there's one thing I want you to take away today, it's this: safe drivers are made, not born.",tip:"Say slowly. Pause before the takeaway. Let it breathe."},
{p:"I'll leave you with this thought.",m:"Elegant closing signal.",before:"Okay so that's about it...",after:"I'll leave you with this thought — every system reflects the values of the people who built it.",tip:"A closing thought should be quotable. Write it beforehand."},
{p:"Thank you for your time and your attention.",m:"Closes with sincere gratitude.",before:"Okay that's it, thanks.",after:"Thank you for your time and your attention — both are valuable, and I don't take either for granted.",tip:"The addition after the comma makes it memorable."},
]},
{cat:"Meeting & pushback",type:"meeting",items:[
{p:"Actually, I'd like to finish my point.",m:"Reclaims the floor without aggression.",before:"(going silent when interrupted)",after:"Actually, I'd like to finish my point — and then I'd love to hear your thoughts.",tip:"'And then I'd love to hear your thoughts' disarms the interrupter."},
{p:"I want to make sure I understand your concern.",m:"Buys time and shows maturity.",before:"(getting defensive)",after:"I want to make sure I understand your concern before I respond.",tip:"Always makes you look like the more senior person in the room."},
{p:"That's one way to look at it. Another way would be...",m:"Redirects without dismissing.",before:"No, that's not right.",after:"That's one way to look at it. Another way would be to consider the long-term support cost.",tip:"Lets the other person save face while you correct the direction."},
{p:"I think we may be solving for different problems.",m:"Exposes a misalignment elegantly.",before:"That doesn't make sense.",after:"I think we may be solving for different problems — can we align on the goal first?",tip:"Redirects conflict toward collaboration."},
{p:"With respect, I'd push back on that slightly.",m:"Professional disagreement — polite but firm.",before:"I disagree.",after:"With respect, I'd push back on that slightly — the data doesn't support that conclusion.",tip:"'Slightly' keeps the relationship intact."},
{p:"Can I add some context to that?",m:"Politely corrects without a direct challenge.",before:"That's not the full story.",after:"Can I add some context? There are factors that aren't visible in that summary.",tip:"Framing a correction as 'adding context' is much less threatening."},
{p:"I'm confident in this recommendation.",m:"Holds a position under pressure.",before:"I think this is right but I'm not sure...",after:"I'm confident in this recommendation based on what I've seen in similar implementations.",tip:"Confidence is a skill. This phrase practices it."},
{p:"Let's take this offline.",m:"Removes conflict from a group setting.",before:"Can we talk later?",after:"This is important — let's take it offline so we can give it the attention it deserves.",tip:"The added reason makes it sound collaborative, not dismissive."},
]},
];
const IDIOMS=[
{cat:"Business performance",type:"biz",items:[
{p:"Business is booming.",m:"Business is growing fast and strong.",ex:"We just signed three new carriers this quarter — business is booming.",when:"Describing strong growth to clients or in a team meeting.",tip:"Short, punchy, confident. No explanation needed."},
{p:"We're gaining traction.",m:"Starting to get real results after a period of effort.",ex:"The new training module launched six weeks ago and we're already gaining traction with the fleet segment.",when:"Early-stage success after a launch or new initiative.",tip:"Use when things are moving but not yet at full speed."},
{p:"We're firing on all cylinders.",m:"Everything working at full capacity.",ex:"Since we integrated the new platform, the whole operation is firing on all cylinders.",when:"Celebrating a period of high performance.",tip:"Comes from car engines — all cylinders working = peak power."},
{p:"The needle is moving.",m:"Progress is happening — measurable improvement.",ex:"Three months into the pilot, the needle is finally moving on crash reduction rates.",when:"Reporting progress on a slow-moving goal.",tip:"Especially good when the goal is hard to measure."},
{p:"We're ahead of the curve.",m:"Doing something before the rest of the industry catches on.",ex:"We built adaptive learning into our platform five years ago — we were ahead of the curve.",when:"Describing your competitive advantage.",tip:"Great for positioning ADEPT Driver against competitors."},
{p:"We're in the black.",m:"The company is profitable.",ex:"After a tough two years, I'm happy to report we are firmly in the black.",when:"Financial discussions, board updates.",tip:"Opposite is 'in the red' — losing money."},
{p:"Numbers are trending up.",m:"Metrics are improving over time.",ex:"Completion rates, engagement scores, claim reductions — everything is trending up.",when:"Presenting data to leadership or clients.",tip:"More confident-sounding than 'the numbers are getting better.'"},
{p:"We're hitting our stride.",m:"Reaching peak performance after a warm-up period.",ex:"The team struggled in Q1, but we're really hitting our stride now.",when:"After overcoming early challenges.",tip:"Implies earned momentum, not luck."},
]},
{cat:"Problems & challenges",type:"problems",items:[
{p:"We hit a wall.",m:"Stopped making progress — a hard obstacle.",ex:"We hit a wall with the state regulatory approval — nothing was moving for three months.",when:"Explaining a stalled project.",tip:"Honest and relatable — even executives say this."},
{p:"We're in the weeds.",m:"Overwhelmed by details — can't see the big picture.",ex:"We got so deep into the technical specs that we were in the weeds and lost the client's attention.",when:"Explaining why a meeting or project got derailed.",tip:"Use to describe what happened, or prevent it: 'Let's not get in the weeds here.'"},
{p:"There's a bottleneck.",m:"One thing slowing everything else down.",ex:"The bottleneck right now is approval time from the carrier's compliance team.",when:"Diagnosing why a process is slow.",tip:"Technical and business people both use this — bridges your two worlds perfectly."},
{p:"We're putting out fires.",m:"Dealing with urgent problems reactively.",ex:"This week we've just been putting out fires — no time for the strategic work.",when:"Explaining a reactive week or period.",tip:"Implies you'd rather be proactive — signals self-awareness."},
{p:"We dropped the ball.",m:"Someone failed to do what was expected.",ex:"I'll be honest — we dropped the ball on the onboarding timeline for that client.",when:"Taking accountability openly.",tip:"Owning this phrase builds more trust than deflecting."},
{p:"It's a moving target.",m:"The goal or requirement keeps changing.",ex:"Regulatory compliance in this space is a moving target — what's acceptable today may change next quarter.",when:"Explaining unpredictability to stakeholders.",tip:"Useful for managing expectations."},
{p:"We're spinning our wheels.",m:"Working hard but making no real progress.",ex:"Without a clear decision from leadership, we're just spinning our wheels.",when:"Signaling that a decision or resource is needed.",tip:"Implies you're ready to move — just blocked."},
{p:"The elephant in the room.",m:"The obvious problem everyone sees but no one is addressing.",ex:"I think the elephant in the room here is that our pricing model needs to be revisited.",when:"When you need to name something uncomfortable in a meeting.",tip:"Saying this takes courage — positions you as the honest voice in the room."},
]},
{cat:"Decisions & strategy",type:"decisions",items:[
{p:"Let's move the needle.",m:"Let's make meaningful, measurable progress.",ex:"We've talked about brand awareness for two quarters. What will actually move the needle?",when:"Pushing a team from discussion to action.",tip:"Implies impatience with talk and readiness for results."},
{p:"We need to pivot.",m:"Strategically change direction based on new information.",ex:"The enterprise segment isn't responding — I think we need to pivot toward the mid-market.",when:"Proposing a strategic shift.",tip:"'Pivot' sounds intentional and smart."},
{p:"Let's not boil the ocean.",m:"Don't try to solve everything at once — focus.",ex:"I appreciate the ambition, but let's not boil the ocean. What's the one thing we must get right first?",when:"Keeping a team focused when scope is getting too large.",tip:"One of the most useful meeting phrases you'll ever use."},
{p:"We need to pull the trigger.",m:"Make the decision and act — stop hesitating.",ex:"We've been evaluating vendors for four months. It's time to pull the trigger.",when:"When a decision has been delayed too long.",tip:"Signals decisiveness — leaders say this."},
{p:"We need to get buy-in.",m:"We need people to agree and actively support this.",ex:"Before we roll this out, we need to get buy-in from the carrier's IT team.",when:"Planning implementation of a change.",tip:"'Buy-in' implies people need to be persuaded, not just informed."},
{p:"Low-hanging fruit.",m:"Easy wins that should be grabbed first.",ex:"The low-hanging fruit here is fixing the onboarding email sequence — that alone would cut drop-off by 30%.",when:"Prioritizing what to tackle first.",tip:"Shows you're practical and results-focused."},
{p:"Let's not reinvent the wheel.",m:"Use what already works instead of building from scratch.",ex:"We already have a compliance framework that works. Let's not reinvent the wheel — just adapt it.",when:"When someone proposes doing something from scratch unnecessarily.",tip:"Saves time and positions you as pragmatic."},
{p:"That's our bread and butter.",m:"Our core, reliable product or service.",ex:"teenSMART is our bread and butter — it's what built our reputation in the carrier space.",when:"Describing your most important offering.",tip:"Warm, confident, unpretentious."},
]},
{cat:"People & teams",type:"people",items:[
{p:"She's a go-getter.",m:"Highly motivated, proactive person.",ex:"The new account manager is a real go-getter — she had three client calls set up in her first week.",when:"Complimenting someone's drive and initiative.",tip:"One of the warmest professional compliments you can give."},
{p:"Let's get everyone on the same page.",m:"Make sure everyone has the same understanding.",ex:"Before we start the project, let's get everyone on the same page about timelines and deliverables.",when:"Opening a kickoff meeting or resolving confusion.",tip:"Essential phrase. Use it constantly."},
{p:"He's the go-to person.",m:"The expert everyone turns to for a specific thing.",ex:"For anything technical about the platform, I'm the go-to person on our team.",when:"Introducing yourself or a colleague's role.",tip:"Say this about yourself confidently — it's not bragging, it's clarity."},
{p:"She wears many hats.",m:"Does many different roles — versatile.",ex:"In a company our size, everyone wears many hats. I'm the President but I also get into the technical weeds.",when:"Describing yourself or a colleague at a small company.",tip:"Perfect for describing life at ADEPT Driver."},
{p:"He's a straight shooter.",m:"Direct, honest — says what he means.",ex:"I appreciate working with their CTO — he's a straight shooter, no politics.",when:"Describing someone you trust and respect.",tip:"High compliment in American business culture."},
{p:"Keep me in the loop.",m:"Keep me updated and informed as things develop.",ex:"I don't need to be in every meeting, but please keep me in the loop on any client escalations.",when:"Delegating while staying informed.",tip:"Very natural — use this constantly as a president."},
]},
{cat:"Meetings",type:"mtg",items:[
{p:"Let's take that offline.",m:"Let's discuss privately, not in this group meeting.",ex:"That's a great point — let's take that offline so we can give it the proper attention.",when:"When a side discussion is taking over the meeting.",tip:"The most useful meeting phrase in existence."},
{p:"Can we park that?",m:"Set that idea aside temporarily — come back to it later.",ex:"That's worth exploring — can we park it for now and come back after the main agenda?",when:"Preventing meeting derailment.",tip:"'Park' is gentler than 'table' — implies you'll definitely return to it."},

let activeTab='phrases';
let activeCat='';

function getData(){return activeTab==='phrases'?PHRASES:IDIOMS;}

function buildCats(){
  const row=document.getElementById('cats');
  row.innerHTML='';
  const all=document.createElement('button');
  all.className='cat-btn active';all.textContent='All';
  all.onclick=()=>setCat('');
  row.appendChild(all);
  getData().forEach(s=>{
    const b=document.createElement('button');
    b.className='cat-btn';b.textContent=s.cat;
    b.onclick=()=>setCat(s.cat);
    row.appendChild(b);
  });
}

function setCat(c){
  activeCat=c;
  document.querySelectorAll('.cat-btn').forEach(b=>{
    b.classList.toggle('active',b.textContent===(c||'All'));
  });
  render();
}

function setTab(t){
  activeTab=t;
  activeCat='';
  document.querySelectorAll('.tab-btn').forEach((b,i)=>{
    b.classList.toggle('active',(i===0&&t==='phrases')||(i===1&&t==='idioms'));
  });
  buildCats();
  render();
}

function speak(txt){
  window.speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(txt);
  u.lang='en-US';u.rate=0.85;
  window.speechSynthesis.speak(u);
}

function render(){
  const q=document.getElementById('q').value.toLowerCase();
  let total=0,html='';
  getData().forEach(sec=>{
    if(activeCat&&sec.cat!==activeCat)return;
    const items=sec.items.filter(i=>{
      const s=(i.p+i.m+(i.before||'')+(i.after||'')+(i.ex||'')+(i.when||'')+(i.tip||'')).toLowerCase();
      return !q||s.includes(q);
    });
    if(!items.length)return;
    total+=items.length;
    html+=`<div><div class="sec-header">${sec.cat}</div>`;
    items.forEach(i=>{
      const safe=i.p.replace(/\\/g,'\\\\').replace(/'/g,"\\'");
      if(activeTab==='phrases'){
        html+=`<div class="card ${sec.type}">
          <div class="card-top">
            <div style="flex:1"><div class="phrase">"${i.p}"</div><div class="meaning">${i.m}</div></div>
            <button class="spk-btn" onclick="speak('${safe}')" aria-label="Hear phrase">&#128266;</button>
          </div>
          <div class="ba">
            <div class="ba-box ba-before"><div class="ba-label">Before</div>${i.before}</div>
            <div class="ba-box ba-after"><div class="ba-label">After</div>${i.after}</div>
          </div>
          <div class="tip">${i.tip}</div>
        </div>`;
      } else {
        html+=`<div class="card ${sec.type}">
          <div class="card-top">
            <div style="flex:1"><div class="phrase">"${i.p}"</div><div class="meaning">${i.m}</div></div>
            <button class="spk-btn" onclick="speak('${safe}')" aria-label="Hear expression">&#128266;</button>
          </div>
          <div class="example"><div class="example-label">Example — in your voice</div>${i.ex}</div>
          ${i.when?`<div class="when"><strong>When to use:</strong> ${i.when}</div>`:''}
          ${i.tip?`<div class="tip">${i.tip}</div>`:''}
        </div>`;
      }
    });
    html+='</div>';
  });
  document.getElementById('cnt').textContent=total+' expressions';
  document.getElementById('main').innerHTML=total?html:`<div class="empty"><p style="font-size:40px;margin-bottom:12px">&#128269;</p><p>No results found.</p></div>`;
}

buildCats();render();
</script>
