<script>
const PHRASES=[
{cat:"Presentation phrases",type:"exec",items:[
{p:"Let me walk you through this.",m:"Classic professional opener for any explanation.",before:"So let me explain...",after:"Let me walk you through the architecture of the system.",tip:"Use to open any technical explanation."},
{p:"There are three key points I want to make.",m:"Signals organized thinking — audiences relax when they know what's coming.",before:"I have some things to say...",after:"There are three key points I want to make about our migration plan.",tip:"Always preview your structure."},
{p:"Let me start with the big picture.",m:"Opens broad before going deep.",before:"Okay so first...",after:"Let me start with the big picture before we get into the details.",tip:"Essential for mixed technical and non-technical audiences."},
{p:"This brings me to my next point.",m:"Smooth transition between ideas.",before:"And also...",after:"This brings me to my next point about scalability.",tip:"Replaces the dreaded 'um, so...'"},
{p:"To summarize what we've covered...",m:"Signals you're wrapping up — helps audiences retain.",before:"So yeah that's it...",after:"To summarize: the problem, the solution, and the timeline.",tip:"Always close with a summary."},
{p:"The question worth asking here is...",m:"Introduces a key point as a rhetorical question.",before:"So we need to think about...",after:"The question worth asking here is: can our infrastructure support this growth?",tip:"Engages the audience — makes them think with you."},
{p:"What makes this significant is...",m:"Tells the audience why they should care.",before:"This is important because...",after:"What makes this significant is that no other vendor has solved this.",tip:"Use after presenting a finding or data point."},
{p:"I want to be very clear about this.",m:"Signals a critical point is coming.",before:"Listen...",after:"I want to be very clear — this is not a resource issue, it's a process issue.",tip:"Prevents misunderstanding on important points."},
{p:"Bear with me for a moment.",m:"Buys time confidently — shows you're in control of the pace.",before:"Um wait...",after:"Bear with me for a moment while I pull up the right data.",tip:"Confident people say this — it's not weakness."},
{p:"Does that make sense so far?",m:"Checks comprehension without sounding unsure.",before:"You understand?",after:"Does that make sense so far, or would you like me to go deeper?",tip:"Much better than 'you get it?' or 'right?'"},
{p:"Let me give you a concrete example.",m:"Signals a practical illustration is coming.",before:"Like for example...",after:"Let me give you a concrete example of how this plays out in production.",tip:"Grounds abstract concepts in reality."},
{p:"The bottom line is...",m:"Cuts to the conclusion — executives love this.",before:"So basically...",after:"The bottom line is: we need three more weeks to do this right.",tip:"Use when you sense the room wants you to get to the point."},
{p:"My recommendation would be...",m:"Owns a position with confidence.",before:"I think maybe we should...",after:"My recommendation would be to phase the rollout over two quarters.",tip:"'Would be' sounds considered but still authoritative."},
{p:"This is where it gets interesting.",m:"Re-engages an audience that may be drifting.",before:"Okay so now...",after:"This is where it gets interesting — the system performs better under stress.",tip:"Use before your most important point."},
]},
{cat:"Social conversation",type:"social",items:[
{p:"How do you know [the host]?",m:"The universal opener at any party or gathering.",before:"(standing alone nervously)",after:"How do you know Sarah? Did you two go to school together?",tip:"Works at every event. Everyone has an answer and it naturally leads somewhere."},
{p:"I love what you said about...",m:"Joins an existing group conversation gracefully.",before:"(interrupting awkwardly)",after:"I love what you said about that — I've been thinking the same thing.",tip:"Listen for 30 seconds before jumping in. Then reference something just said."},
{p:"This is my first time here — is it always this lively?",m:"Admits newness in a charming way.",before:"I don't really know anyone here.",after:"This is my first time at one of these — is it always this lively?",tip:"Invites people to help you feel welcome."},
{p:"What do you do when you're not [here]?",m:"Gets people talking about what they love.",before:"What do you do for work?",after:"What do you do when you're not celebrating your friends' birthdays?",tip:"More interesting than 'what do you do?' — gets personal faster."},
{p:"That's actually really fascinating — tell me more.",m:"The phrase that makes anyone feel heard.",before:"Oh okay cool.",after:"That's actually really fascinating — tell me more about how that works.",tip:"People remember conversations where they felt interesting."},
{p:"You know, I never thought about it that way.",m:"Shows intellectual humility — people love this.",before:"Hmm.",after:"You know, I never thought about it that way. That actually changes how I see it.",tip:"Makes the other person feel insightful."},
{p:"Can I ask your take on something?",m:"Invites someone into a mini-discussion.",before:"What do you think?",after:"Can I ask your take on something? I've been wrestling with this idea lately.",tip:"People feel flattered when asked for their opinion specifically."},
{p:"What's been the highlight of your week?",m:"Better than 'how are you' — gets a real answer.",before:"How are you doing?",after:"What's been the highlight of your week so far?",tip:"Almost no one asks this. It makes you memorable."},
{p:"I couldn't help but overhear — sorry to jump in, but...",m:"Polite way to join a conversation you weren't part of.",before:"(never joining)",after:"I couldn't help but overhear — I'm sorry to jump in, but I actually dealt with something similar.",tip:"The apology for interrupting makes the interruption welcome."},
{p:"That reminds me of something that happened to me.",m:"Natural bridge to sharing your own story.",before:"Oh yeah me too...",after:"That actually reminds me of something that happened when I first moved to the U.S.",tip:"Personal stories connect people faster than facts."},
]},
{cat:"Dad joke delivery",type:"dad",items:[
{p:"Okay, I have to warn you — this is a dad joke.",m:"The pre-warning is half the humor.",before:"(just saying the joke cold)",after:"Okay, I have to warn you — this is a dad joke. You ready?",tip:"The meta-awareness makes it funnier every time."},
{p:"I'm not apologizing for that one.",m:"Sells the joke after the groan.",before:"(laughing nervously)",after:"(after the groan) I'm not apologizing for that one. That was solid.",tip:"Confidence after a groan is the key to dad joke delivery."},
{p:"I've been waiting all day to say that.",m:"Classic dad joke closer.",before:"Haha get it?",after:"I've been waiting all day to say that.",tip:"Implies you planned it — makes it more endearing."},
{p:"That one's free. The next one costs you.",m:"Keeps the energy going after a successful joke.",before:"(nothing)",after:"That one's free. The next one costs you.",tip:"Works perfectly when you're on a roll with your son's friends."},
{p:"I know, I know. I'll see myself out.",m:"Self-aware exit after a truly terrible pun.",before:"(laughing at your own joke too hard)",after:"I know, I know. I'll see myself out.",tip:"Physically pretend to leave. Gets a laugh every time."},
]},
{cat:"Public speaking",type:"speaker",items:[
{p:"Thank you for having me — it's an honor to be here.",m:"Classic and graceful opening.",before:"Um okay so thank you for inviting me...",after:"Thank you for having me — it's a genuine honor to be here with all of you today.",tip:"Say it slowly — don't rush the opening."},
{p:"Let me start with a question.",m:"Engages the audience from the very first sentence.",before:"So today I'm going to talk about...",after:"Let me start with a question — how many of you have ever felt that technology was working against you?",tip:"Rhetorical questions create instant participation."},
{p:"In my experience working with...",m:"Grounds your credibility naturally without bragging.",before:"I know a lot about this because...",after:"In my experience working with insurance carriers and fleet operators across the country...",tip:"Let your experience speak — don't announce it."},
{p:"What I've come to believe, after decades in this field, is...",m:"Authority statement that carries real weight.",before:"I think...",after:"What I've come to believe, after decades in this field, is that technology only works when people trust it.",tip:"'Decades in this field' does the credibility work for you."},
{p:"Let me tell you a story.",m:"The most powerful pivot in any talk.",before:"Here's an example...",after:"Let me tell you a story. When I first came to this country at 13 years old...",tip:"The audience leans in every single time."},
{p:"And that's when it hit me.",m:"The turning point phrase in any story.",before:"And then I realized...",after:"And that's when it hit me — the problem wasn't the system. It was how we were thinking about it.",tip:"'Hit me' is visceral. Signals a genuine moment of insight."},
{p:"If there's one thing I want you to take away today...",m:"Signals your core message — the most remembered moment.",before:"So the main point is...",after:"If there's one thing I want you to take away today, it's this: safe drivers are made, not born.",tip:"Say slowly. Pause before the takeaway. Let it breathe."},
{p:"I'll leave you with this thought.",m:"Elegant closing signal.",before:"Okay so that's about it...",after:"I'll leave you with this thought — every system we build reflects the values of the people who built it.",tip:"A closing thought should be quotable. Write it down beforehand."},
{p:"Thank you for your time and your attention.",m:"Closes with gratitude that feels sincere.",before:"Okay that's it, thanks.",after:"Thank you for your time and your attention — both are valuable, and I don't take either for granted.",tip:"The addition after the comma elevates a routine close into something memorable."},
]},
{cat:"Meeting & pushback",type:"meeting",items:[
{p:"Actually, I'd like to finish my point.",m:"Reclaims the floor without aggression.",before:"(going silent when interrupted)",after:"Actually, I'd like to finish my point — and then I'd love to hear your thoughts.",tip:"'And then I'd love to hear your thoughts' disarms the interrupter."},
{p:"I want to make sure I understand your concern.",m:"Buys time and shows maturity when someone challenges you.",before:"(getting defensive)",after:"I want to make sure I understand your concern before I respond.",tip:"Always makes you look like the more senior person in the room."},
{p:"That's one way to look at it. Another way would be...",m:"Redirects without dismissing.",before:"No, that's not right.",after:"That's one way to look at it. Another way would be to consider the long-term support cost.",tip:"Lets the other person save face while you correct the direction."},
{p:"I think we may be solving for different problems.",m:"Elegant way to expose a misalignment.",before:"That doesn't make sense.",after:"I think we may be solving for different problems — can we align on the goal first?",tip:"Redirects conflict toward collaboration."},
{p:"With respect, I'd push back on that slightly.",m:"Professional disagreement — polite but firm.",before:"I disagree.",after:"With respect, I'd push back on that slightly — the data doesn't support that conclusion.",tip:"'Slightly' keeps the relationship intact."},
{p:"Can I add some context to that?",m:"Politely corrects without a direct challenge.",before:"That's not the full story.",after:"Can I add some context? There are factors that aren't visible in that summary.",tip:"Framing a correction as 'adding context' is much less threatening."},
{p:"I'm confident in this recommendation.",m:"Holds a position under pressure without becoming defensive.",before:"I think this is right but I'm not sure...",after:"I'm confident in this recommendation based on what I've seen in similar implementations.",tip:"Confidence is a skill. This phrase practices it."},
{p:"Let's take this offline.",m:"Removes conflict from a group setting.",before:"Can we talk later?",after:"This is important — let's take it offline so we can give it the attention it deserves.",tip:"The added reason makes it sound collaborative, not dismissive."},
]},
{cat:"Church & fellowship",type:"church",items:[
{p:"That really spoke to me.",m:"The message deeply resonated — moved me personally.",before:"I liked the sermon.",after:"That really spoke to me — especially the part about perseverance.",tip:"The most natural post-sermon response in an English-speaking church."},
{p:"I felt convicted by that.",m:"The message challenged me and revealed something I need to change.",before:"That was good.",after:"I felt convicted by the passage on forgiveness — I've been holding onto something I need to let go.",tip:"'Convicted' means God used the message to show you something personal — not guilt as punishment."},
{p:"We need to be intentional about this.",m:"We need to make deliberate, purposeful effort — not just hope it happens.",before:"We should try harder.",after:"If we want our fellowship group to grow, we need to be intentional about welcoming newcomers.",tip:"'Intentional' is one of the most common words in American Christian circles."},
{p:"How can I pray for you?",m:"Offering to intercede — one of the most generous things you can say.",before:"I'll pray for you.",after:"I know you're dealing with a lot at work. How can I pray for you this week?",tip:"This single question deepens relationships faster than almost anything else."},
{p:"God is faithful.",m:"God keeps His promises — a declaration of trust.",before:"Things will work out.",after:"It's been a hard season, but God is faithful. He's never let us down.",tip:"Simple, powerful, and deeply resonant in any fellowship setting."},
{p:"That's a God thing.",m:"This was clearly God's doing — too perfect to be coincidence.",before:"What a coincidence.",after:"I ran into that client at church of all places. That's a God thing.",tip:"Warm, casual, and deeply relatable to any Christian."},
{p:"Iron sharpens iron.",m:"We make each other better through honest relationship — from Proverbs 27:17.",before:"We help each other.",after:"That's why I value this fellowship group — iron sharpens iron. You guys push me.",tip:"Instantly recognizable to any church community — shows your Biblical literacy."},
{p:"I'm still processing that.",m:"The message or experience is still working on me — I need time.",before:"I don't know what to say.",after:"The sermon this morning was a lot. I'm still processing that honestly.",tip:"Honesty in church settings is always more connecting than a polished answer."},
{p:"We're blessed to be a blessing.",m:"Our blessings are meant to flow outward to others.",before:"We should give back.",after:"We don't do this outreach to look good — we're blessed to be a blessing.",tip:"Captures the outward-focused heart of healthy Christian community."},
]},
];

const VOCAB=[
{cat:"Market & industry",type:"vocab",items:[
{weak:"the market is growing",power:"the addressable market is expanding",ex:"The addressable market is expanding rapidly — and we're positioned to capture a significant share.",when:"Talking to investors, clients, or leadership about market opportunity.",tip:"'Addressable market' signals you know your target, not just the whole industry."},
{weak:"competition is tough",power:"the competitive landscape is intensifying",ex:"The competitive landscape is intensifying, which is exactly why our differentiation matters now more than ever.",when:"Discussing competitors in a meeting or presentation.",tip:"'Landscape' implies you've mapped it — you know who's who."},
{weak:"customers want this",power:"the market is signaling demand",ex:"The market is signaling strong demand for adaptive learning — our data confirms it.",when:"Making a case for a new product or feature.",tip:"'Signaling' sounds data-driven, not anecdotal."},
{weak:"things are changing fast",power:"disruption is accelerating",ex:"Disruption is accelerating in the telematics space — we either lead or follow.",when:"Describing industry change to motivate action.",tip:"Use sparingly — 'disruption' is overused, but 'accelerating' keeps it fresh."},
{weak:"the market is bad",power:"headwinds are significant",ex:"Headwinds are significant this quarter, but our retention numbers remain strong.",when:"Explaining a challenging environment without sounding defeated.",tip:"'Headwinds' is a pilot term — perfect for your aviation interests too."},
{weak:"we saw it coming",power:"we anticipated this trend",ex:"We anticipated this trend two years ago — that's why we invested in the platform early.",when:"Claiming strategic foresight.",tip:"Implies you were ahead of the curve without saying it directly."},
{weak:"everyone is doing it",power:"it's becoming an industry standard",ex:"Two-factor authentication is becoming an industry standard — we need to adopt it now.",when:"Justifying a change by pointing to broader adoption.",tip:"'Industry standard' makes the case without needing further argument."},
{weak:"our share is growing",power:"we're gaining market penetration",ex:"We're gaining market penetration in the commercial fleet segment faster than projected.",when:"Reporting growth to leadership or clients.",tip:"Specific and measurable-sounding — signals you track this carefully."},
]},
{cat:"Financial",type:"vocab",items:[
{weak:"we made money",power:"we generated strong margins",ex:"Despite the challenging quarter, we generated strong margins on the carrier side of the business.",when:"Financial updates to leadership or board.",tip:"'Margins' is more precise than 'money' — shows financial literacy."},
{weak:"we lost money",power:"margins compressed",ex:"Margins compressed this quarter due to onboarding costs for three new enterprise clients.",when:"Explaining a down period without sounding defeated.",tip:"'Compressed' sounds temporary and manageable — not catastrophic."},
{weak:"it costs too much",power:"the ROI doesn't justify it",ex:"I looked at the numbers — the ROI doesn't justify the implementation cost at this stage.",when:"Rejecting an expense or initiative professionally.",tip:"ROI framing moves the conversation from opinion to math."},
{weak:"we saved money",power:"we realized cost savings",ex:"By consolidating vendors, we realized significant cost savings in Q3.",when:"Reporting efficiency improvements.",tip:"'Realized' implies the savings were planned and achieved — not accidental."},
{weak:"it's profitable",power:"it's margin-positive",ex:"The new certification module isn't our biggest revenue driver, but it's margin-positive.",when:"Defending a smaller product or service that still contributes.",tip:"More precise than 'profitable' — implies you know the numbers."},
{weak:"sales went up",power:"top-line growth accelerated",ex:"Top-line growth accelerated in Q4 — up 18% year over year.",when:"Reporting revenue growth.",tip:"'Top-line' = revenue. 'Bottom-line' = profit. Know both."},
{weak:"profit went up",power:"bottom-line performance improved",ex:"Bottom-line performance improved significantly after we restructured the support team.",when:"Reporting profit improvement.",tip:"Pairing top-line and bottom-line language signals genuine financial fluency."},
{weak:"we need money",power:"we need to secure additional capital",ex:"To fund the next phase of development, we need to secure additional capital.",when:"Discussing funding needs with leadership or investors.",tip:"'Capital' is professional. 'Money' sounds informal in this context."},
]},
{cat:"Product & innovation",type:"vocab",items:[
{weak:"we're launching it",power:"we're bringing it to market",ex:"We're bringing the adaptive learning module to market in Q2 — fully integrated with the existing platform.",when:"Announcing a product launch internally or to clients.",tip:"'Bringing to market' implies a complete go-to-market strategy, not just shipping."},
{weak:"it's new",power:"it's a first-to-market solution",ex:"What we've built is a first-to-market solution for fleet operators in this regulatory environment.",when:"Positioning a new product competitively.",tip:"Only say this if it's genuinely true — but when it is, say it confidently."},
{weak:"it works better",power:"it delivers superior outcomes",ex:"Our platform doesn't just train drivers — it delivers superior outcomes in crash reduction.",when:"Comparing your product to alternatives.",tip:"'Outcomes' shifts the conversation from features to results."},
{weak:"customers will like it",power:"it addresses a critical pain point",ex:"This feature addresses a critical pain point for fleet managers — manual compliance tracking.",when:"Pitching a new feature or product to stakeholders.",tip:"'Pain point' language shows you built it for the customer, not for yourself."},
{weak:"it's different",power:"it's meaningfully differentiated",ex:"What makes our platform meaningfully differentiated is the behavioral science behind the training design.",when:"Explaining your competitive advantage.",tip:"'Meaningful' is the key word — implies others' differences don't actually matter."},
{weak:"we tested it",power:"we validated it through a proof of concept",ex:"Before full rollout, we validated the integration through a proof of concept with two carrier partners.",when:"Describing due diligence on a new initiative.",tip:"'Proof of concept' signals rigor — you didn't just guess."},
{weak:"it's ready",power:"it's production-ready",ex:"After six months of testing, I'm confident the platform is production-ready.",when:"Giving a go-ahead for launch.",tip:"'Production-ready' is a tech term that also signals high standards to non-technical people."},
{weak:"the next version",power:"the next iteration",ex:"The next iteration of the platform will include real-time coaching feedback.",when:"Discussing product roadmap.",tip:"'Iteration' implies continuous improvement — you're always getting better."},
]},
{cat:"Strategy & decisions",type:"vocab",items:[
{weak:"our plan",power:"our strategic roadmap",ex:"Our strategic roadmap for the next 18 months prioritizes carrier retention and platform expansion.",when:"Presenting plans to leadership, clients, or partners.",tip:"'Roadmap' implies it's visual, sequenced, and thought through."},
{weak:"we're focusing on",power:"we're doubling down on",ex:"Given the results we've seen, we're doubling down on the fleet segment in Q3.",when:"Signaling strong commitment to a direction.",tip:"'Doubling down' implies you've seen evidence and you're going all in — confident."},
{weak:"it's a priority",power:"it's a strategic imperative",ex:"Driver safety technology is not a nice-to-have — it's a strategic imperative for any serious carrier.",when:"Elevating the importance of an initiative.",tip:"'Imperative' means non-negotiable. Use when you need people to act, not just agree."},
{weak:"we're working on it",power:"it's in flight",ex:"The API integration is already in flight — we expect to complete it by end of month.",when:"Updating on active work in progress.",tip:"'In flight' is widely understood in business — signals momentum without overpromising."},
{weak:"good timing",power:"favorable tailwinds",ex:"Regulatory pressure on fleet safety is creating favorable tailwinds for our business.",when:"Explaining why external conditions are helping you.",tip:"Opposite of headwinds — same aviation metaphor. Use them as a pair."},
{weak:"we're behind",power:"we have ground to make up",ex:"I won't sugarcoat it — we have ground to make up in the enterprise segment.",when:"Being honest about a gap without sounding defeated.",tip:"'Ground to make up' implies it's possible — you're behind but not out."},
{weak:"we decided",power:"we made a deliberate decision to",ex:"We made a deliberate decision to stay focused on driver safety rather than expand into adjacent markets.",when:"Defending a strategic choice.",tip:"'Deliberate' signals it wasn't accidental or reactive — you chose this."},
{weak:"we're not doing that",power:"that's outside our current strategic scope",ex:"That's outside our current strategic scope — but it's worth revisiting in our next planning cycle.",when:"Declining a request or idea professionally.",tip:"Leaves the door open while still saying no clearly."},
]},
{cat:"People & organization",type:"vocab",items:[

{cat:"Decisions & strategy",type:"decisions",items:[

{cat:"Meetings",type:"mtg",items:[
{p:"Let's take that offline.",m:"Let's discuss privately, not in this group meeting.",ex:"That's a great point — let's take that offline so we can give it the proper attention.",when:"When a side discussion is taking over the meeting.",tip:"The most useful meeting phrase in existence. Use it constantly."},
{p:"Can we park that?",m:"Set that idea aside temporarily — come back to it later.",ex:"That's worth exploring — can we park it for now and come back after the main agenda?",when:"Preventing meeting derailment.",tip:"'Park' is gentler than 'table' — implies you'll definitely return to it."},
{p:"Let's level-set.",m:"Make sure we all start from the same understanding.",ex:"Before we dive in, let's level-set on where we are with the carrier integration.",when:"Opening a meeting where people may have different information.",tip:"Signals you're organized and want clarity before proceeding."},
{p:"To piggyback on what you said...",m:"Build on someone else's point — extend their idea.",ex:"To piggyback on what Richard said — I think the timeline issue also affects our Q4 projections.",when:"Adding to a point that was just made.",tip:"Much smoother than 'and also' or 'yeah and...'"},

{cat:"Anime & manga",type:"anime",items:[

const SITCOM=[
{cat:"Everyday social",type:"sitcom",items:[
{p:"We don't need to make a whole thing out of this.",m:"Keeping something small — don't blow it up into a big deal.",situation:"Everyday social",ex:"Look, I forgot to call back. We don't need to make a whole thing out of this.",when:"Defusing an overreaction — at work, with family, at church.",tip:"Perfect when someone is escalating something minor."},
{p:"That's not a thing.",m:"Rejecting something someone made up or exaggerated.",situation:"Everyday social",ex:"No, 'casual Fridays apply to Zoom calls too' is not a thing.",when:"Pushing back on a made-up rule or norm.",tip:"Delivered with a slight smile — light but firm."},

{cat:"Disagreements",type:"sitcom",items:[
{p:"That's not what I said.",m:"Correcting a misquote or misrepresentation of your words.",situation:"Disagreements",ex:"Hold on — that's not what I said. I said we should delay, not cancel.",when:"When someone has paraphrased you incorrectly.",tip:"Calm and direct — don't let misquotes stand uncorrected."},
{p:"You're missing the point.",m:"Redirecting someone who has gone off track.",situation:"Disagreements",ex:"I think you're missing the point — this isn't about the cost, it's about the timeline.",when:"When the other person is arguing about the wrong thing.",tip:"Follow immediately with what the actual point is."},
{p:"Where is this coming from?",m:"Surprised by an unexpected accusation or sudden shift in tone.",situation:"Disagreements",ex:"Where is this coming from? We agreed on this approach last week.",when:"When someone raises something that seems to come out of nowhere.",tip:"Genuine curiosity — not defensive. Tone is everything here."},

{p:"I hear you, but...",m:"Acknowledging before disagreeing — the diplomatic pivot.",situation:"Disagreements",ex:"I hear you, but the data doesn't support that conclusion.",when:"Disagreeing with someone in a way that keeps the relationship intact.",tip:"The 'but' signals disagreement — but the 'I hear you' softens it significantly."},

{p:"Help me understand...",m:"Asking for clarification without sounding aggressive.",situation:"Disagreements",ex:"Help me understand — how does cutting the support team improve client satisfaction?",when:"When you disagree but want to hear the reasoning first.",tip:"Disarms defensiveness — sounds curious, not combative."},

{cat:"Giving advice",type:"sitcom",items:[
{p:"Here's what I think you should do...",m:"Direct advice opener — confident and clear.",situation:"Giving advice",ex:"Here's what I think you should do — have the conversation directly instead of through email.",when:"When someone asks for your advice and you have a clear answer.",tip:"Don't hedge too much. People who ask for advice usually want a real answer."},
{p:"Have you tried...?",m:"Suggesting something gently without telling them what to do.",situation:"Giving advice",ex:"Have you tried addressing it directly with him instead of waiting for a group meeting?",when:"Offering a suggestion without being prescriptive.",tip:"The question form gives them ownership — less resistance."},
{p:"What's the worst that could happen?",m:"Encouraging someone to take a risk by reframing the downside.",situation:"Giving advice",ex:"You're afraid to bring it up with the CEO? What's the worst that could happen?",when:"When someone is paralyzed by fear of a small risk.",tip:"Usually the worst case isn't as bad as it feels — this helps people see that."},
{p:"I've been there.",m:"Establishing empathy before giving advice.",situation:"Giving advice",ex:"I've been there — feeling like no one in the room is listening. Here's what helped me.",when:"Before sharing advice from personal experience.",tip:"These three words open people up more than almost anything else."},
{p:"You need to hear this.",m:"About to say something hard but necessary.",situation:"Giving advice",ex:"I say this because I care about you — you need to hear this. The way you handled that meeting hurt your credibility.",when:"Delivering a difficult truth to someone you're close to.",tip:"Only say this to people who trust you. The relationship must come first."},

{p:"Pick your battles.",m:"Not every fight is worth having — choose wisely.",situation:"Giving advice",ex:"I know it bothers you, but pick your battles. This one isn't worth the political capital.",when:"Advising someone who is fighting too many things at once.",tip:"Incredibly useful in office politics and family dynamics."},
{p:"Take it with a grain of salt.",m:"Don't take that too seriously — consider the source.",situation:"Giving advice",ex:"He said the project would take a year. Take it with a grain of salt — he always over-estimates.",when:"Helping someone calibrate how seriously to take someone else's input.",tip:"Wise and measured — shows experience."},

{cat:"Sarcasm & wit",type:"sitcom",items:[

{p:"That escalated quickly.",m:"When something went from normal to dramatic very fast.",situation:"Sarcasm & wit",ex:"We were talking about the budget and somehow ended up debating the entire company strategy. That escalated quickly.",when:"After a conversation or situation got out of hand fast.",tip:"Self-aware and funny — shows you can step back and observe."},
{p:"I did not see that coming.",m:"Genuine or sarcastic surprise at an outcome.",situation:"Sarcasm & wit",ex:"He actually agreed to the whole proposal without pushing back. I did not see that coming.",when:"Reacting to an unexpected outcome — positive or negative.",tip:"Delivered straight-faced, it gets a laugh every time."},
{p:"I'm going to pretend I didn't hear that.",m:"Dismissing something ridiculous without engaging it.",situation:"Sarcasm & wit",ex:"You want to launch next week with no testing? I'm going to pretend I didn't hear that.",when:"When someone says something so unreasonable you won't dignify it with a real response.",tip:"Humorous but firm — you've made your point without an argument."},
{p:"That's one way to look at it.",m:"Polite disagreement with a hint of dry humor.",situation:"Sarcasm & wit",ex:"You think the client loved that demo? That's one way to look at it.",when:"When you disagree but want to stay diplomatic.",tip:"The subtext is clear — you don't agree. But it's delivered with grace."},
{p:"Of all the things I expected, that was not one of them.",m:"Strong surprise — genuine or exaggerated.",situation:"Sarcasm & wit",ex:"He sent a 47-slide deck for a 15-minute meeting. Of all the things I expected, that was not one of them.",when:"Reacting to something truly unexpected.",tip:"The longer phrasing makes it funnier than just 'I didn't expect that.'"},
{p:"No, please, tell me more.",m:"Sarcastic invitation to keep going — when you've heard enough.",situation:"Sarcasm & wit",ex:"(after a 20-minute explanation of something simple) No, please, tell me more.",when:"When someone is dramatically over-explaining.",tip:"Delivered with a smile — the sarcasm is gentle, not mean."},
{p:"I'll just show myself out.",m:"Leaving gracefully after an awkward joke or comment.",situation:"Sarcasm & wit",ex:"(after a bad pun) I'll just show myself out.",when:"After your own joke or comment lands badly.",tip:"Self-deprecating — shows you don't take yourself too seriously."},
]},
];

let activeTab='phrases';
let activeCat='';

function getData(){
  if(activeTab==='phrases')return PHRASES;
  if(activeTab==='vocab')return VOCAB;
  if(activeTab==='idioms')return IDIOMS;
  return SITCOM;
}

function buildCats(){
  const row=document.getElementById('cats');
  row.innerHTML='';
  const all=document.createElement('button');
  all.className='cat-btn active';all.textContent='All';
  all.onclick=()=>setCat('');
  row.appendChild(all);
  getData().forEach(s=>{
    const b=document.createElement('button');
    b.className='cat-btn';b.textContent=s.cat;
    b.onclick=()=>setCat(s.cat);
    row.appendChild(b);
  });
}

function setCat(c){
  activeCat=c;
  document.querySelectorAll('.cat-btn').forEach(b=>{
    b.classList.toggle('active',b.textContent===(c||'All'));
  });
  render();
}

function setTab(t){
  activeTab=t;
  activeCat='';
  document.querySelectorAll('.tab-btn').forEach(b=>{
    const labels={phrases:'Structured',vocab:'Power',idioms:'Idioms',sitcom:'Friends'};
    b.classList.toggle('active',b.textContent.includes(labels[t]));
  });
  buildCats();
  render();
}

function speak(txt){
  window.speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(txt);
  u.lang='en-US';u.rate=0.85;
  window.speechSynthesis.speak(u);
}

function render(){
  const q=document.getElementById('q').value.toLowerCase();
  let total=0,html='';
  getData().forEach(sec=>{
    if(activeCat&&sec.cat!==activeCat)return;
    const items=sec.items.filter(i=>{
      const s=(i.p||i.weak||'')+(i.power||'')+(i.m||'')+(i.before||'')+(i.after||'')+(i.ex||'')+(i.when||'')+(i.tip||'');
      return !q||s.toLowerCase().includes(q);
    });
    if(!items.length)return;
    total+=items.length;
    html+=`<div><div class="sec-header">${sec.cat}</div>`;
    items.forEach(i=>{
      if(activeTab==='phrases'){
        const safe=(i.p||'').replace(/\\/g,'\\\\').replace(/'/g,"\\'");
        html+=`<div class="card ${sec.type}">
          <div class="card-top">
            <div style="flex:1"><div class="phrase">"${i.p}"</div><div class="meaning">${i.m}</div></div>
            <button class="spk-btn" onclick="speak('${safe}')">&#128266;</button>
          </div>
          <div class="ba">
            <div class="ba-box ba-before"><div class="ba-label">Before</div>${i.before}</div>
            <div class="ba-box ba-after"><div class="ba-label">After</div>${i.after}</div>
          </div>
          <div class="tip">${i.tip}</div>
        </div>`;
      } else if(activeTab==='vocab'){
        const safe=(i.power||'').replace(/\\/g,'\\\\').replace(/'/g,"\\'");
        html+=`<div class="card ${sec.type}">
          <div class="swap-row">
            <span class="weak-word">&#10005; ${i.weak}</span>
            <span class="arrow">&#8594;</span>
            <span class="power-word">&#10003; ${i.power}</span>
            <button class="spk-btn" onclick="speak('${safe}')" style="margin-left:auto">&#128266;</button>
          </div>
          <div class="example"><div class="ex-label">Example — in your voice</div>${i.ex}</div>
          <div class="when"><strong>When:</strong> ${i.when}</div>
          <div class="tip">${i.tip}</div>
        </div>`;
      } else if(activeTab==='idioms'){
        const safe=(i.p||'').replace(/\\/g,'\\\\').replace(/'/g,"\\'");
        html+=`<div class="card ${sec.type}">
          <div class="card-top">
            <div style="flex:1"><div class="phrase">"${i.p}"</div><div class="meaning">${i.m}</div></div>
            <button class="spk-btn" onclick="speak('${safe}')">&#128266;</button>
          </div>
          <div class="example"><div class="ex-label">Example — in your voice</div>${i.ex}</div>
          <div class="when"><strong>When:</strong> ${i.when}</div>
          <div class="tip">${i.tip}</div>
        </div>`;
      } else {
        const safe=(i.p||'').replace(/\\/g,'\\\\').replace(/'/g,"\\'");
        html+=`<div class="card ${sec.type}">
          <div class="card-top">
            <div style="flex:1">
              <span class="situation">${i.situation}</span>
              <div class="phrase">"${i.p}"</div>
              <div class="meaning">${i.m}</div>
            </div>
            <button class="spk-btn" onclick="speak('${safe}')">&#128266;</button>
          </div>
          <div class="example"><div class="ex-label">Example</div>${i.ex}</div>
          <div class="when"><strong>When:</strong> ${i.when}</div>
          <div class="tip">${i.tip}</div>
        </div>`;
      }
    });
    html+='</div>';
  });
  document.getElementById('cnt').textContent=total+' items';
  document.getElementById('main').innerHTML=total?html:`<div class="empty"><p style="font-size:40px;margin-bottom:12px">&#128269;</p><p>No results found. Try a different search.</p></div>`;
}

buildCats();render();
</script>

if('serviceWorker' in navigator){
  navigator.serviceWorker.getRegistrations().then(regs=>{
    regs.forEach(reg=>reg.unregister());
  }).then(()=>{
    navigator.serviceWorker.register('sw.js');
  });
}
</script>
